<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Help Now</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body>

<header>
  <nav class="navbar">
    <div class="logo">
      <a href="index.html">
        <img src="/assets/gigconnect.logo.png" alt="">
        <span class="logo-text">GigConnect</span>
      </a>
    </div>

    <ul class="nav-link">
      <li><a href="howitworks.html">How It Works</a></li>
      <li><a href="findHelpNow.html">Services</a></li>
      <li><a href="contactus.html">Contact us</a></li>
    </ul>

    <div class="nav-buttons">
      <div class="dropdown">
        <button class="Login-btn">Login</button>
        <div class="dropdown-content">
          <a href="clientlogin.html">Login as Client</a>
          <a href="professionallogin.html">Login as Professional</a>
        </div>
      </div>
      <a href="signup.html" class="Signup-btn">Sign up</a>
    </div>
  </nav>
</header>

<!-- ================= SEARCH SECTION ================= -->
<div class="all-content">

  <div class="search-section">
    <form>

      <div class="search-bar-group">
        <div class="input-with-icon">
          <img src="/assets/search-bar.png" alt="">
          <input id="search-skill" type="text"
                 placeholder="Search for service (e.g. Electrician)">
        </div>
        <button type="button" class="find-help">Find Help</button>
      </div>

      <div class="input-with-icon">
        <img src="/assets/location-img.png" alt="">
        <input id="search-city" type="text"
               placeholder="Enter your location (e.g. Sector 56, Gurugram)">
      </div>

      <button type="button" class="clear-btn">Clear Search</button>

      <div class="filters-bar">
        <span>Showing Professionals</span>

        <select id="sort-select">
          <option value="">Sort by</option>
          <option value="experience">Experience (High → Low)</option>
          <option value="rating">Rating (High → Low)</option>
          <option value="distance">Distance (Near → Far)</option>
        </select>
      </div>

    </form>
  </div>

  <!-- ================= RESULTS ================= -->
  <section class="workers">
    <h2>Explore Professionals</h2>

    <p class="loading-message" style="display:none;">
      Loading Professionals...
    </p>

    <div class="worker-cards"></div>
  </section>

</div>

<!-- ================= FOOTER ================= -->
<footer class="main-footer">
  <div class="container">
    <p>© 2025 GigConnect. All rights reserved.</p>
  </div>
</footer>

<script src="/javascript/findhelpnow.js"></script>
</body>
</html>
